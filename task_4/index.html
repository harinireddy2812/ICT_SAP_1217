<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Restaurant Menu</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<h1>Welcome to Foodie's Paradise</h1>

<div id="category-container">
    <h2>Categories</h2>
    <button onclick="showCategory('Burgers')">Burgers</button>
    <button onclick="showCategory('Pizzas')">Pizzas</button>
    <button onclick="showCategory('Ice Cream')">Ice Cream</button>
    <button onclick="showCategory('Biryani')">Biryani</button>
</div>

<div id="menu-container">
    <h2>Menu Items</h2>
    <div id="menu-items"></div>
</div>

<div id="cart-container">
    <h2>Cart</h2>
    <ul id="cart-items"></ul>
    <p>Total: $<span id="total">0</span></p>
</div>

<script src="script.js"></script>
</body>
</html>
